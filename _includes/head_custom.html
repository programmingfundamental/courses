<script type="module">
  import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";

  mermaid.initialize({
    startOnLoad: false,
    securityLevel: "strict"
  });

  document.addEventListener("DOMContentLoaded", async () => {
    const blocks = document.querySelectorAll("code.language-mermaid, .language-mermaid code");

    blocks.forEach((codeBlock) => {
      const source = codeBlock.textContent;
      const preBlock = codeBlock.closest("pre");
      const rougeBlock = codeBlock.closest(".highlighter-rouge");
      const container = rougeBlock || preBlock;

      if (!container) {
        return;
      }

      const diagram = document.createElement("div");
      diagram.className = "mermaid";
      diagram.textContent = source;

      container.replaceWith(diagram);
    });

    try {
      await mermaid.run({
        querySelector: ".mermaid"
      });
    } catch (error) {
      console.error("Mermaid rendering failed", error);
    }
  });
</script>
